<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Batataria Real - O Melhor Delivery</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary: #F87E23; /* Flame-Orange */
            --secondary: #8C6F5A; /* Burgundy-Brown */
            --dark: #4A4A4A; /* Charcoal-Gray */
            --accent: #D6A238; /* Potato-Gold */
            --bg: #F9F3E0; /* Cream */
            --white: #ffffff;
            --shadow: 0 4px 12px rgba(0,0,0,0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Roboto, sans-serif; }

        body { background-color: var(--bg); color: var(--dark); line-height: 1.6; }

        /* Header & Status */
        header {
            background: var(--dark);
            color: var(--white);
            padding: 20px;
            text-align: center;
            border-bottom: 4px solid var(--primary);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo { width: 80px; margin-bottom: 10px; }
        
        .status-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: bold;
            margin-top: 5px;
        }
        .open { background: #2ecc71; color: white; }
        .closed { background: #e74c3c; color: white; }

        .delivery-info {
            font-size: 0.85rem;
            color: var(--accent);
            margin-top: 8px;
        }

        /* Menu Section */
        .container { max-width: 600px; margin: 0 auto; padding: 20px; }

        .category-title {
            font-size: 1.2rem;
            font-weight: 800;
            margin: 25px 0 15px;
            color: var(--secondary);
            border-left: 4px solid var(--primary);
            padding-left: 10px;
            text-transform: uppercase;
        }

        .product-card {
            background: var(--white);
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: var(--shadow);
            transition: transform 0.2s;
        }

        .product-card:active { transform: scale(0.98); }

        .product-info h3 { font-size: 1rem; color: var(--dark); }
        .product-info p { font-size: 0.85rem; color: #777; margin: 4px 0; }
        .price { color: var(--primary); font-weight: bold; font-size: 1.1rem; }

        .add-btn {
            background: var(--primary);
            color: white;
            border: none;
            width: 35px;
            height: 35px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1.2rem;
        }

        /* Cart Logic */
        .cart-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: var(--white);
            padding: 15px 20px;
            box-shadow: 0 -4px 20px rgba(0,0,0,0.15);
            display: none;
            justify-content: space-between;
            align-items: center;
            z-index: 1000;
        }

        .btn-checkout {
            background: var(--primary);
            color: white;
            padding: 12px 25px;
            border-radius: 10px;
            text-decoration: none;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        /* Modal Checkout */
        .modal {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7);
            display: none;
            z-index: 2000;
            justify-content: center;
            align-items: flex-end;
        }

        .modal-content {
            background: var(--white);
            width: 100%;
            max-width: 600px;
            padding: 25px;
            border-radius: 20px 20px 0 0;
            max-height: 90vh;
            overflow-y: auto;
        }

        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; font-size: 0.9rem; margin-bottom: 5px; font-weight: 600; }
        .form-group input, .form-group select {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 1rem;
        }

        .order-summary {
            background: #f8f8f8;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
        }

        .summary-item {
            display: flex;
            justify-content: space-between;
            font-size: 0.9rem;
            margin-bottom: 5px;
        }

        .close-modal { float: right; font-size: 1.5rem; cursor: pointer; }

        @media (max-width: 480px) {
            .container { padding: 15px; }
        }
    </style>
</head>
<body>

<header>
    <img src="https://cdn-icons-png.flaticon.com/512/1046/1046784.png" alt="Logo" class="logo">
    <h1>Batataria Real</h1>
    <div id="status-badge" class="status-badge closed">Verificando...</div>
    <div class="delivery-info">
        <i class="fas fa-motorcycle"></i> Ramos, Olaria, Penha e Bonsucesso<br>
        <i class="fas fa-clock"></i> 20:00 às 01:00
    </div>
</header>

<div class="container">
    <div class="category-title">A Braba das Batatas (Tradicionais)</div>
    <div id="menu-tradicionais"></div>

    <div class="category-title">Batatas Recheadas (As Reais)</div>
    <div id="menu-recheadas"></div>
</div>

<div id="cart-bar" class="cart-bar">
    <div>
        <span id="cart-count">0</span> itens no carrinho<br>
        <strong>Total: <span id="cart-total">R$ 0,00</span></strong>
    </div>
    <a href="#" class="btn-checkout" onclick="openCheckout()">
        Finalizar Pedido <i class="fas fa-chevron-right"></i>
    </a>
</div>

<div id="modal-checkout" class="modal">
    <div class="modal-content">
        <span class="close-modal" onclick="closeCheckout()">&times;</span>
        <h2>Finalizar Pedido</h2>
        <p style="font-size: 0.8rem; color: #666; margin-bottom: 20px;">Preencha os dados para envio via WhatsApp</p>
        
        <div class="order-summary" id="order-summary">
            </div>

        <div class="form-group">
            <label>Seu Nome</label>
            <input type="text" id="nome" placeholder="Ex: João Silva">
        </div>
        
        <div class="form-group">
            <label>Endereço de Entrega</label>
            <input type="text" id="endereco" placeholder="Rua, número e bairro">
        </div>

        <div class="form-group">
            <label>Bairro</label>
            <select id="bairro">
                <option value="Ramos">Ramos</option>
                <option value="Olaria">Olaria</option>
                <option value="Penha">Penha</option>
                <option value="Bonsucesso">Bonsucesso</option>
            </select>
        </div>

        <div class="form-group">
            <label>Forma de Pagamento</label>
            <select id="pagamento">
                <option value="Pix">Pix (Melhor Opção)</option>
                <option value="Cartão Débito">Cartão Débito</option>
                <option value="Cartão Crédito">Cartão Crédito</option>
                <option value="Dinheiro">Dinheiro</option>
            </select>
        </div>

        <button class="btn-checkout" style="width: 100%; justify-content: center; border: none; cursor: pointer;" onclick="sendWhatsApp()">
            <i class="fab fa-whatsapp"></i> ENVIAR PEDIDO AGORA
        </button>
    </div>
</div>

<script>
    const menu = {
        tradicionais: [
            { id: 1, nome: "Batata P (Pequena)", desc: "200g - Crocante com tempero da casa", preco: 14.90 },
            { id: 2, nome: "Batata M (Média)", desc: "400g - Ideal para um lanche rápido", preco: 22.90 },
            { id: 3, nome: "Batata G (Grande)", desc: "700g - Para dividir em dois", preco: 34.90 },
            { id: 4, nome: "Batata Mega (Família)", desc: "1.1kg - O melhor custo benefício!", preco: 49.90 }
        ],
        recheadas: [
            { id: 5, nome: "Cheddar e Bacon Real", desc: "Batata G com muito cheddar e bacon crocante", preco: 42.90 },
            { id: 6, nome: "Frango com Catupiry", desc: "Frango desfiado temperado e Catupiry original", preco: 39.90 }
        ]
    };

    let cart = [];

    // Lógica de Horário
    function checkStatus() {
        const now = new Date();
        const hour = now.getHours();
        const badge = document.getElementById('status-badge');
        
        // Atendimento: 20:00 (20) até 01:00 (0)
        const isOpen = (hour >= 20 || hour < 1);
        
        if(isOpen) {
            badge.innerText = "● LOJA ABERTA";
            badge.className = "status-badge open";
        } else {
            badge.innerText = "● LOJA FECHADA (Abre às 20h)";
            badge.className = "status-badge closed";
        }
    }

    function renderMenu() {
        const tDiv = document.getElementById('menu-tradicionais');
        menu.tradicionais.forEach(item => {
            tDiv.innerHTML += `
                <div class="product-card">
                    <div class="product-info">
                        <h3>${item.nome}</h3>
                        <p>${item.desc}</p>
                        <span class="price">R$ ${item.preco.toFixed(2).replace('.',',')}</span>
                    </div>
                    <button class="add-btn" onclick="addToCart(${item.id})">+</button>
                </div>
            `;
        });

        const rDiv = document.getElementById('menu-recheadas');
        menu.recheadas.forEach(item => {
            rDiv.innerHTML += `
                <div class="product-card">
                    <div class="product-info">
                        <h3>${item.nome}</h3>
                        <p>${item.desc}</p>
                        <span class="price">R$ ${item.preco.toFixed(2).replace('.',',')}</span>
                    </div>
                    <button class="add-btn" onclick="addToCart(${item.id})">+</button>
                </div>
            `;
        });
    }

    function addToCart(id) {
        const item = [...menu.tradicionais, ...menu.recheadas].find(i => i.id === id);
        cart.push(item);
        updateCartBar();
        
        // Haptic Feedback simulado
        if(window.navigator.vibrate) window.navigator.vibrate(50);
    }

    function updateCartBar() {
        const bar = document.getElementById('cart-bar');
        const count = document.getElementById('cart-count');
        const total = document.getElementById('cart-total');
        
        if(cart.length > 0) {
            bar.style.display = 'flex';
            count.innerText = cart.length;
            const totalSum = cart.reduce((acc, curr) => acc + curr.preco, 0);
            total.innerText = `R$ ${totalSum.toFixed(2).replace('.',',')}`;
        }
    }

    function openCheckout() {
        document.getElementById('modal-checkout').style.display = 'flex';
        const summary = document.getElementById('order-summary');
        summary.innerHTML = cart.map(i => `
            <div class="summary-item">
                <span>1x ${i.nome}</span>
                <span>R$ ${i.preco.toFixed(2)}</span>
            </div>
        `).join('');
        
        const totalSum = cart.reduce((acc, curr) => acc + curr.preco, 0);
        summary.innerHTML += `<hr style="margin:10px 0"><div class="summary-item"><strong>Total</strong><strong>R$ ${totalSum.toFixed(2)}</strong></div>`;
    }

    function closeCheckout() {
        document.getElementById('modal-checkout').style.display = 'none';
    }

    function sendWhatsApp() {
        const nome = document.getElementById('nome').value;
        const endereco = document.getElementById('endereco').value;
        const bairro = document.getElementById('bairro').value;
        const pagamento = document.getElementById('pagamento').value;

        if(!nome || !endereco) {
            alert("Por favor, preencha nome e endereço!");
            return;
        }

        const totalSum = cart.reduce((acc, curr) => acc + curr.preco, 0);
        let msg = `*NOVO PEDIDO - BATATARIA REAL*%0A%0A`;
        msg += `*Cliente:* ${nome}%0A`;
        msg += `*Endereço:* ${endereco} - ${bairro}%0A`;
        msg += `*Pagamento:* ${pagamento}%0A%0A`;
        msg += `*ITENS:*%0A`;
        
        cart.forEach(i => {
            msg += `- 1x ${i.nome} (R$ ${i.preco.toFixed(2)})%0A`;
        });

        msg += `%0A*TOTAL: R$ ${totalSum.toFixed(2)}*`;

        const fone = "5521976878741";
        window.open(`https://api.whatsapp.com/send?phone=${fone}&text=${msg}`);
    }

    window.onload = () => {
        checkStatus();
        renderMenu();
        setInterval(checkStatus, 60000); // Atualiza status a cada minuto
    };
</script>

</body>
</html>
"""
