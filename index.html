<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reinos de Éter | Pen & Paper</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    
    <style>
        body { margin: 0; background-color: #1a252f; font-family: 'Press Start 2P', cursive; color: #fff; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        .wood-panel { background-color: #5d4037; border-top: 6px solid #8d6e63; border-bottom: 6px solid #3e2723; box-shadow: inset 0 30px 40px rgba(0,0,0,0.5); }
        .wood-frame { background-color: #3e2723; border: 4px solid #1b100c; border-bottom-color: #8d6e63; border-right-color: #8d6e63; }
        .parchment { background-color: #f4e4bc; color: #3e2723; border: 4px solid #8d6e63; box-shadow: inset 0 0 10px rgba(141, 110, 99, 0.5); }
        .pixel-btn { background-color: #c62828; color: white; border: 4px solid #ef5350; border-bottom-color: #b71c1c; border-right-color: #b71c1c; text-shadow: 2px 2px 0 #000; cursor: pointer; }
        .pixel-btn:active { transform: translateY(4px); border-color: #b71c1c; border-bottom-color: #ef5350; border-right-color: #ef5350; }
        #game-viewport { flex-grow: 1; display: flex; justify-content: center; align-items: center; padding: 20px; }
        #phaser-canvas-container { border: 12px solid #3e2723; border-radius: 4px; box-shadow: 0 15px 35px rgba(0,0,0,0.9); width: 100%; height: 100%; background-color: #000; }
        #table-ui { height: 220px; display: flex; padding: 15px 30px; gap: 20px; z-index: 10; }
        .retro-bar-container { border: 2px solid #000; background-color: #424242; padding: 2px; }
        .retro-hp-bar { background-color: #e53935; height: 12px; transition: width 0.3s; }
        .retro-xp-bar { background-color: #4caf50; height: 12px; transition: width 0.3s; }
    </style>
</head>
<body>

    <div id="game-viewport">
        <div id="phaser-canvas-container"></div>
    </div>

    <div id="table-ui" class="wood-panel">
        <!-- Ficha do Personagem Dinâmica -->
        <div class="parchment p-4 flex flex-col justify-between w-1/4" style="font-size: 10px; line-height: 1.8;">
            <div>
                <h2 id="ui-name" class="text-sm border-b-2 border-yellow-800 pb-1 mb-2">NOVATO</h2>
                <p id="ui-level">NIVEL: 1</p>
                <p id="ui-class">CLASSE: NENHUMA</p>
            </div>
            <div class="space-y-2">
                <div>
                    <span id="ui-hp-text" class="text-[8px]">HP 20/20</span>
                    <div class="retro-bar-container"><div id="ui-hp-bar" class="retro-hp-bar" style="width: 100%"></div></div>
                </div>
                <div>
                    <span id="ui-xp-text" class="text-[8px]">XP 0/100</span>
                    <div class="retro-bar-container"><div id="ui-xp-bar" class="retro-xp-bar" style="width: 0%"></div></div>
                </div>
            </div>
        </div>

        <!-- Botões de Ação -->
        <div class="wood-frame p-4 flex-grow flex flex-col items-center justify-center gap-4">
            <h3 class="text-xs text-yellow-500 text-shadow">AÇÕES DE TURNO</h3>
            <div class="flex gap-4">
                <button id="btn-atk" class="pixel-btn w-16 h-16 flex items-center justify-center text-xs">ATK</button>
            </div>
        </div>

        <!-- Chat / Log do Mestre -->
        <div id="chat-log" class="parchment p-3 w-1/3 overflow-y-auto" style="font-size: 9px; line-height: 1.5; display: flex; flex-direction: column-reverse;">
            <p class="text-red-800 font-bold mb-2">>> DIÁRIO DO MESTRE</p>
            <p>Bem-vindo aos Reinos de Éter. Um Goblin selvagem bloqueia seu caminho!</p>
        </div>
    </div>

    <script>
        // --- SISTEMA DE DADOS DO JOGADOR ---
        let playerStats = {
            level: 1,
            xp: 0,
            xpNeeded: 50,
            maxHp: 20,
            hp: 20,
            damage: 5
        };

        // Função para atualizar a Interface HTML via JavaScript
        function updateUI() {
            document.getElementById('ui-level').innerText = `NIVEL: ${playerStats.level}`;
            document.getElementById('ui-hp-text').innerText = `HP ${playerStats.hp}/${playerStats.maxHp}`;
            document.getElementById('ui-hp-bar').style.width = `${(playerStats.hp / playerStats.maxHp) * 100}%`;
            document.getElementById('ui-xp-text').innerText = `XP ${playerStats.xp}/${playerStats.xpNeeded}`;
            document.getElementById('ui-xp-bar').style.width = `${(playerStats.xp / playerStats.xpNeeded) * 100}%`;
        }

        // Função para escrever no Chat
        function logChat(message, color = "black") {
            const chatLog = document.getElementById('chat-log');
            const p = document.createElement('p');
            p.style.color = color;
            p.innerText = message;
            chatLog.prepend(p); // Adiciona no topo
        }

        // --- MOTOR PHASER ---
        const container = document.getElementById('phaser-canvas-container');
        const config = {
            type: Phaser.AUTO,
            parent: 'phaser-canvas-container',
            width: container.clientWidth,
            height: container.clientHeight,
            physics: { default: 'arcade', arcade: { debug: false } },
            scene: { create: create, update: update }
        };

        const game = new Phaser.Game(config);
        let playerToken;
        let goblinToken;
        let cursors;

        function create() {
            this.cameras.main.setBackgroundColor('#f4e4bc');
            
            // Grid de fundo
            const grid = this.add.graphics();
            grid.lineStyle(1, 0x8d6e63, 0.3);
            for(let i = 0; i < 2000; i += 40) {
                grid.moveTo(i, 0); grid.lineTo(i, 2000);
                grid.moveTo(0, i); grid.lineTo(2000, i);
            }
            grid.strokePath();

            // Cria o Token do Jogador (Azul)
            const pt = this.add.graphics();
            pt.fillStyle(0x1a1a1a, 1); pt.fillCircle(20, 20, 18);
            pt.fillStyle(0x1e88e5, 1); pt.fillRect(10, 10, 20, 20);
            pt.generateTexture('player_sprite', 40, 40);
            pt.destroy();

            // Cria o Token do Goblin (Verde)
            const gt = this.add.graphics();
            gt.fillStyle(0x1a1a1a, 1); gt.fillCircle(20, 20, 18);
            gt.fillStyle(0x43a047, 1); gt.fillRect(10, 10, 20, 20);
            gt.fillStyle(0xb71c1c, 1); gt.fillRect(14, 14, 12, 12); // Olho vermelho
            gt.generateTexture('goblin_sprite', 40, 40);
            gt.destroy();

            // Adiciona no mapa
            playerToken = this.physics.add.sprite(config.width/2, config.height/2, 'player_sprite');
            
            // Spawna o Goblin perto do jogador
            goblinToken = this.physics.add.sprite(playerToken.x + 100, playerToken.y, 'goblin_sprite');
            goblinToken.hp = 15;

            this.cameras.main.startFollow(playerToken, true, 0.1, 0.1);
            cursors = this.input.keyboard.createCursorKeys();

            // --- LÓGICA DO BOTÃO DE ATAQUE ---
            document.getElementById('btn-atk').addEventListener('click', () => {
                // Calcula distância entre jogador e goblin
                const distance = Phaser.Math.Distance.Between(playerToken.x, playerToken.y, goblinToken.x, goblinToken.y);
                
                if (distance > 60) {
                    logChat("* Você balança a arma no ar. O alvo está muito longe!", "gray");
                    return;
                }

                // Causa dano
                goblinToken.hp -= playerStats.damage;
                logChat(`> Você atacou o Goblin causando ${playerStats.damage} de dano!`, "blue");

                // Efeito visual de tremor no Goblin
                this.tweens.add({ targets: goblinToken, x: goblinToken.x + 5, yoyo: true, duration: 50, repeat: 3 });

                // Verifica se o Goblin morreu
                if (goblinToken.hp <= 0) {
                    logChat("+++ VOCÊ DERROTOU O GOBLIN! + 25 XP", "green");
                    playerStats.xp += 25;
                    
                    // Verifica Level Up
                    if (playerStats.xp >= playerStats.xpNeeded) {
                        playerStats.level++;
                        playerStats.xp = 0;
                        playerStats.xpNeeded = Math.floor(playerStats.xpNeeded * 1.5);
                        playerStats.maxHp += 10;
                        playerStats.hp = playerStats.maxHp;
                        playerStats.damage += 3;
                        logChat(`!!! LEVEL UP !!! Você agora é Nível ${playerStats.level}!`, "purple");
                    }

                    updateUI();

                    // Respawn do Goblin em outro lugar
                    goblinToken.x = playerToken.x + Phaser.Math.Between(-150, 150);
                    goblinToken.y = playerToken.y + Phaser.Math.Between(-150, 150);
                    goblinToken.hp = 15 + (playerStats.level * 5); // Fica mais forte
                }
            });

            updateUI(); // Chama a primeira vez para arrumar a tela
        }

        function update() {
            playerToken.setVelocity(0);
            if (cursors.left.isDown) playerToken.setVelocityX(-200);
            else if (cursors.right.isDown) playerToken.setVelocityX(200);
            if (cursors.up.isDown) playerToken.setVelocityY(-200);
            else if (cursors.down.isDown) playerToken.setVelocityY(200);
        }

        window.addEventListener('resize', () => { game.scale.resize(container.clientWidth, container.clientHeight); });
    </script>
</body>
</html>
